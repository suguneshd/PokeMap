<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PokéMap Explorer</title>
  <link href="[https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap](https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap)" rel="stylesheet"/>
  
  <!-- Link to the external CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>PokéMap Explorer</h1>
  </header>

  <!-- CONTROLS -->
  <div class="controls-container">
    
    <div class="control-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="Type a name..." />
    </div>

    <div class="control-group">
      <label>Type Filter</label>
      <select id="typeFilter">
        <option value="">All Types</option>
        <option value="fire">Fire</option>
        <option value="water">Water</option>
        <option value="grass">Grass</option>
        <option value="electric">Electric</option>
        <option value="psychic">Psychic</option>
        <option value="normal">Normal</option>
        <option value="fighting">Fighting</option>
        <option value="flying">Flying</option>
        <option value="poison">Poison</option>
        <option value="ground">Ground</option>
        <option value="rock">Rock</option>
        <option value="bug">Bug</option>
        <option value="ghost">Ghost</option>
        <option value="steel">Steel</option>
        <option value="dragon">Dragon</option>
        <option value="dark">Dark</option>
        <option value="fairy">Fairy</option>
        <option value="ice">Ice</option>
      </select>
    </div>

    <div class="control-group">
      <label>Generation</label>
      <div>
        <button class="gen-btn active" onclick="loadGeneration(0, 151, this)">Gen I</button>
        <button class="gen-btn" onclick="loadGeneration(151, 100, this)">Gen II</button>
        <button class="gen-btn" onclick="loadGeneration(251, 135, this)">Gen III</button>
      </div>
    </div>

  </div>

  <div class="info-bar" id="infoText">Loading Pokemon...</div>

  <!-- GRID -->
  <div class="grid" id="pokemonGrid"></div>

  <!-- MODAL (Popup Window) -->
  <div class="modal-background" id="modalWindow">
    <div class="modal-content">
      <img id="modalImage" src="" alt="Pokemon" />
      <h2 class="modal-name" id="modalName">Name</h2>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Link to the external JS file -->
  <script src="script.js"></script>
</body>
</html>
